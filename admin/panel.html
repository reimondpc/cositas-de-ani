<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Cositas de Ani</title>
    <link rel="icon" href="../favicon.png" type="image/png">
    <link rel="stylesheet" href="admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Cositas de Ani</h2>
                <span>Panel Admin</span>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-section="products">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                    </svg>
                    Productos
                </button>
                <button class="nav-item" data-section="categories">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="4" y1="6" x2="20" y2="6"></line>
                        <line x1="4" y1="12" x2="20" y2="12"></line>
                        <line x1="4" y1="18" x2="20" y2="18"></line>
                    </svg>
                    Categorías
                </button>
                <button class="nav-item" data-section="settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"></path>
                    </svg>
                    Configuración
                </button>
                <a href="../index.html" class="nav-item" target="_blank">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                    Ver Catálogo
                </a>
                <button class="nav-item" id="themeToggle" title="Cambiar tema">
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                    </svg>
                    Cambiar tema
                </button>
                <button class="nav-item logout" id="logoutBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Cerrar Sesión
                </button>
            </nav>
        </aside>

        <main class="main-content">
            <!-- Products Section -->
            <div id="productsSection">
                <header class="content-header">
                    <h1>Productos</h1>
                    <button class="btn-add" id="addProductBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        Agregar Producto
                    </button>
                </header>
                <div class="products-grid" id="productsGrid"></div>
                <div id="loadingState" class="loading-state">
                    <div class="spinner-large"></div>
                    <p>Cargando productos...</p>
                </div>
                <div id="emptyState" class="empty-state" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                    </svg>
                    <p>No hay productos aún</p>
                    <span>Agrega tu primer producto para comenzar</span>
                </div>
            </div>

            <!-- Categories Section -->
            <div id="categoriesSection" style="display: none;">
                <header class="content-header">
                    <h1>Categorías</h1>
                    <button class="btn-add" id="addCategorySectionBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        Agregar Categoría
                    </button>
                </header>
                <div class="categories-list-admin" id="categoriesAdminList"></div>
                <div id="categoriesEmpty" class="empty-state" style="display: none;">
                    <p>No hay categorías</p>
                    <span>Crea la primera categoría para comenzar</span>
                </div>
            </div>

            <!-- Settings Section -->
            <div id="settingsSection" style="display: none;">
                <header class="content-header">
                    <h1>Configuración</h1>
                </header>
                <div class="settings-card">
                    <form id="settingsForm">
                        <div class="form-group">
                            <label for="settingsWhatsapp">Número de WhatsApp (sin +)</label>
                            <input type="text" id="settingsWhatsapp" required placeholder="Ej: 18292727257">
                        </div>
                        <div class="form-group">
                            <label for="settingsSiteName">Nombre de la Tienda</label>
                            <input type="text" id="settingsSiteName" required placeholder="Ej: Cositas de Ani">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-save">Guardar Configuración</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div id="productModal" class="modal-form">
        <div class="modal-form-overlay"></div>
        <div class="modal-form-content">
            <div class="modal-form-header">
                <h2 id="modalTitle">Agregar Producto</h2>
                <button class="modal-form-close" id="closeModalBtn">&times;</button>
            </div>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-row">
                    <div class="form-group">
                        <label for="productName">Nombre del Producto</label>
                        <input type="text" id="productName" required placeholder="Ej: Reloj de Oro">
                    </div>
                    <div class="form-group">
                        <label for="productPrice">Precio (RD$)</label>
                        <input type="number" id="productPrice" required min="0" step="any" placeholder="Ej: 1500">
                    </div>
                </div>
                <div class="form-group">
                    <label for="productDescription">Descripción</label>
                    <textarea id="productDescription" rows="3" placeholder="Descripción del producto..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="productCategory">Categoría</label>
                        <select id="productCategory">
                            <option value="general">General</option>
                            <option value="nuevo">Nuevo</option>
                            <option value="oferta">Oferta</option>
                            <option value="popular">Popular</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="productImageInput">Imágenes</label>
                        <div class="image-upload-wrapper">
                            <input type="file" id="productImageInput" accept="image/*" multiple class="image-input">
                            <div class="image-preview-grid" id="imagePreview"></div>
                            <input type="hidden" id="productImages">
                            <p class="image-hint">Selecciona una o más imágenes para el producto</p>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" id="cancelBtn">Cancelar</button>
                    <button type="submit" class="btn-save" id="saveBtn">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script>
        const SUPABASE_URL = 'https://eodkpelkplrgqxbmkqka.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvZGtwZWxrcGxyZ3F4Ym1rcWthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDU1MjksImV4cCI6MjA5NDI4MTUyOX0.ZWNwMsCZO6P4VcVUjOB9Zt7-95qoWziYuf21fHo7mRU';

        function initTheme() {
            const savedTheme = localStorage.getItem('catalogue-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('catalogue-theme', newTheme);
        }

        initTheme();

        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const productsGrid = document.getElementById('productsGrid');
        const loadingState = document.getElementById('loadingState');
        const emptyState = document.getElementById('emptyState');
        const productModal = document.getElementById('productModal');
        const productForm = document.getElementById('productForm');
        const modalTitle = document.getElementById('modalTitle');
        const toast = document.getElementById('toast');
        const imageInput = document.getElementById('productImageInput');
        const imagePreview = document.getElementById('imagePreview');
        const imageHidden = document.getElementById('productImages');

        let editingProductId = null;
        let siteSettings = { whatsapp: '18292727257', categories: ['general'], site_name: 'Cositas de Ani' };
        const productCategory = document.getElementById('productCategory');

        async function loadSettings() {
            const { data } = await supabaseClient
                .from('site_settings')
                .select('*')
                .eq('id', 1)
                .single();
            if (data) {
                siteSettings = data;
                document.getElementById('settingsWhatsapp').value = data.whatsapp || '';
                document.getElementById('settingsSiteName').value = data.site_name || '';
            }
        }

        function renderProductCategories() {
            const cats = siteSettings.categories || ['general'];
            productCategory.innerHTML = cats.map(c =>
                `<option value="${c}">${c.charAt(0).toUpperCase() + c.slice(1)}</option>`
            ).join('');
        }

        function renderCategoriesAdmin() {
            const list = document.getElementById('categoriesAdminList');
            const empty = document.getElementById('categoriesEmpty');
            const cats = siteSettings.categories || [];
            if (cats.length === 0) {
                list.innerHTML = '';
                empty.style.display = 'flex';
                return;
            }
            empty.style.display = 'none';
            list.innerHTML = cats.map((cat, i) => `
                <div class="category-admin-card">
                    <span class="cat-name">${cat.charAt(0).toUpperCase() + cat.slice(1)}</span>
                    <div class="cat-actions">
                        <button class="btn-cat-edit" onclick="editarCategoria(${i})" title="Editar">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"></path>
                                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                            </svg>
                        </button>
                        <button class="btn-cat-delete" onclick="eliminarCategoria(${i})" title="Eliminar">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function editarCategoria(index) {
            const cats = siteSettings.categories || [];
            const oldName = cats[index];
            const newName = prompt('Editar categoría:', oldName);
            if (newName && newName.trim().toLowerCase() !== oldName) {
                cats[index] = newName.trim().toLowerCase();
                guardarCategorias();
            }
        }

        function eliminarCategoria(index) {
            if (confirm('¿Eliminar esta categoría?')) {
                const cats = siteSettings.categories || [];
                cats.splice(index, 1);
                guardarCategorias();
            }
        }

        async function guardarCategorias() {
            const { error } = await supabaseClient
                .from('site_settings')
                .update({
                    categories: siteSettings.categories || [],
                    updated_at: new Date().toISOString()
                })
                .eq('id', 1);
            if (error) {
                showToast('Error al guardar categorías: ' + error.message, 'error');
            } else {
                renderCategoriesAdmin();
                renderProductCategories();
                showToast('Categorías actualizadas');
            }
        }

        function cambiarSeccion(section) {
            document.querySelectorAll('.nav-item[data-section]').forEach(b => b.classList.remove('active'));
            document.querySelector(`.nav-item[data-section="${section}"]`).classList.add('active');
            document.getElementById('productsSection').style.display = section === 'products' ? '' : 'none';
            document.getElementById('categoriesSection').style.display = section === 'categories' ? '' : 'none';
            document.getElementById('settingsSection').style.display = section === 'settings' ? '' : 'none';
            if (section === 'categories') renderCategoriesAdmin();
        }

        document.querySelectorAll('.nav-item[data-section]').forEach(btn => {
            btn.addEventListener('click', () => cambiarSeccion(btn.dataset.section));
        });

        document.getElementById('addCategorySectionBtn').addEventListener('click', () => {
            const name = prompt('Nombre de la nueva categoría:');
            if (name && name.trim()) {
                if (!siteSettings.categories) siteSettings.categories = [];
                const cat = name.trim().toLowerCase();
                if (!siteSettings.categories.includes(cat)) {
                    siteSettings.categories.push(cat);
                    guardarCategorias();
                } else {
                    showToast('La categoría ya existe', 'error');
                }
            }
        });

        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'index.html';
            }
        }

        async function loadProducts() {
            loadingState.style.display = 'flex';
            productsGrid.innerHTML = '';

            const { data: products, error } = await supabaseClient
                .from('products')
                .select('*')
                .order('created_at', { ascending: false });

            loadingState.style.display = 'none';

            if (error) {
                showToast('Error al cargar productos', 'error');
                return;
            }

            if (products.length === 0) {
                emptyState.style.display = 'flex';
                return;
            }

            emptyState.style.display = 'none';
            productsGrid.innerHTML = products.map(product => {
                const imgSrc = Array.isArray(product.images) ? product.images[0] : product.image;
                return `
                <div class="product-card-admin">
                    <img src="${imgSrc}" alt="${product.name}" class="product-img">
                    <div class="product-info-admin">
                        <h3>${product.name}</h3>
                        <span class="product-price">${product.price}</span>
                        <span class="product-category">${product.category}</span>
                    </div>
                    <div class="product-actions-admin">
                        <button class="btn-edit" onclick="editProduct('${product.id}')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"></path>
                                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                            </svg>
                        </button>
                        <button class="btn-delete" onclick="deleteProduct('${product.id}')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function openModal(isEdit = false) {
            editingProductId = null;
            imageInput.value = '';
            productForm.reset();
            renderProductCategories();
            imagePreview.innerHTML = '<span class="preview-placeholder">Selecciona o arrastra una o más imágenes</span>';
            imageHidden.value = '';
            modalTitle.textContent = isEdit ? 'Editar Producto' : 'Agregar Producto';
            productModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            productModal.classList.remove('active');
            document.body.style.overflow = '';
            editingProductId = null;
        }

        function obtenerArrayImagenes(product) {
            if (Array.isArray(product.images)) return product.images;
            if (product.images) return [product.images];
            if (product.image) return [product.image];
            return [];
        }

        async function editProduct(id) {
            imageInput.value = '';

            const { data: product } = await supabaseClient
                .from('products')
                .select('*')
                .eq('id', id)
                .single();

            if (product) {
                editingProductId = id;
                document.getElementById('productId').value = product.id;
                document.getElementById('productName').value = product.name;
                document.getElementById('productPrice').value = product.price.replace(/^RD\$/, '').replace(/,/g, '');
                document.getElementById('productDescription').value = product.description || '';
                document.getElementById('productCategory').value = product.category;

                const images = obtenerArrayImagenes(product);
                imageHidden.value = JSON.stringify(images);
                imagePreview.innerHTML = images.map(url =>
                    `<div class="preview-item"><img src="${url}" alt="Preview"></div>`
                ).join('');
                modalTitle.textContent = 'Editar Producto';
                productModal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }

        async function deleteProduct(id) {
            if (confirm('¿Estás seguro de eliminar este producto?')) {
                const { error } = await supabaseClient
                    .from('products')
                    .delete()
                    .eq('id', id);

                if (error) {
                    showToast('Error al eliminar producto', 'error');
                } else {
                    showToast('Producto eliminado correctamente');
                    loadProducts();
                }
            }
        }

        function comprimirImagen(file, maxWidth = 1920, quality = 0.85) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let { width, height } = img;
                        if (width > maxWidth) {
                            height = Math.round(height * maxWidth / width);
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob(blob => {
                            resolve(new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), { type: 'image/jpeg' }));
                        }, 'image/jpeg', quality);
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        imageInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                Promise.all(files.map(file => new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = (ev) => resolve(ev.target.result);
                    reader.readAsDataURL(file);
                }))).then(previews => {
                    imagePreview.innerHTML = previews.map(src =>
                        `<div class="preview-item"><img src="${src}" alt="Preview"></div>`
                    ).join('');
                });
            }
        });

        async function uploadImages(files) {
            const urls = [];
            for (const file of files) {
                showToast('Comprimiendo y subiendo imagen...', 'success');
                const comprimida = await comprimirImagen(file);
                const fileName = `${Date.now()}-${Math.random().toString(36).slice(2)}.jpg`;
                const { data, error } = await supabaseClient.storage
                    .from('product-images')
                    .upload(fileName, comprimida, {
                        cacheControl: '3600',
                        upsert: false
                    });
                if (error) {
                    showToast('Error al subir imagen: ' + error.message, 'error');
                    return null;
                }
                urls.push(`${SUPABASE_URL}/storage/v1/object/public/product-images/${fileName}`);
            }
            return urls;
        }

        async function saveProduct(e) {
            e.preventDefault();

            const files = Array.from(imageInput.files);

            let imageUrls = [];
            const existingJson = imageHidden.value;
            if (existingJson) {
                try {
                    imageUrls = JSON.parse(existingJson);
                } catch {
                    imageUrls = existingJson ? [existingJson] : [];
                }
            }

            if (files.length > 0) {
                showToast('Subiendo imágenes...', 'success');
                const uploadedUrls = await uploadImages(files);
                if (!uploadedUrls) return;
                imageUrls = uploadedUrls;
            } else if (imageUrls.length === 0) {
                showToast('Debes seleccionar al menos una imagen', 'error');
                return;
            }

            const product = {
                name: document.getElementById('productName').value,
                price: 'RD$' + document.getElementById('productPrice').value,
                description: document.getElementById('productDescription').value,
                category: document.getElementById('productCategory').value,
                image: imageUrls[0],
                images: imageUrls
            };

            let result;
            if (editingProductId) {
                product.updated_at = new Date().toISOString();
                result = await supabaseClient
                    .from('products')
                    .update(product)
                    .eq('id', editingProductId);
            } else {
                result = await supabaseClient
                    .from('products')
                    .insert([product]);
            }

            if (result.error) {
                showToast('Error al guardar producto: ' + result.error.message, 'error');
            } else {
                showToast(editingProductId ? 'Producto actualizado' : 'Producto agregado');
                closeModal();
                loadProducts();
            }
        }

        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        document.getElementById('addProductBtn').addEventListener('click', () => openModal(false));
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('cancelBtn').addEventListener('click', closeModal);
        document.querySelector('.modal-form-overlay').addEventListener('click', closeModal);
        productForm.addEventListener('submit', saveProduct);

        document.getElementById('themeToggle').addEventListener('click', toggleTheme);

        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const whatsapp = document.getElementById('settingsWhatsapp').value.trim();
            const siteName = document.getElementById('settingsSiteName').value.trim();
            if (!whatsapp || !siteName) {
                showToast('Completa todos los campos', 'error');
                return;
            }
            const { error } = await supabaseClient
                .from('site_settings')
                .upsert({
                    id: 1,
                    whatsapp,
                    site_name: siteName,
                    categories: siteSettings.categories || ['general'],
                    updated_at: new Date().toISOString()
                });
            if (error) {
                showToast('Error al guardar: ' + error.message, 'error');
            } else {
                siteSettings.whatsapp = whatsapp;
                siteSettings.site_name = siteName;
                showToast('Configuración guardada');
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && productModal.classList.contains('active')) {
                closeModal();
            }
        });

        checkAuth().then(async () => {
            await loadSettings();
            renderProductCategories();
            loadProducts();
        });
    </script>
</body>
</html>

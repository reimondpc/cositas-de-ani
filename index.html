    <script type="application/ld+json">

                </div>

                </a>
                <button id="themeToggle" class="theme-toggle" title="Cambiar tema">
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                </button>
            </div>
        </div>
        <div class="categories">
            <button class="category-btn active" data-category="all">Todos</button>
            <button class="category-btn" data-category="general">General</button>
        </div>

    <section class="hero">
        <h2 class="hero-title">Colección</h2>
        <p class="hero-subtitle">Selección exclusiva de productos para ti</p>
    </section>

    <main class="main">
        <div id="productsGrid" class="products-grid"></div>
        <div id="noResults" class="no-results" style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <p>No se encontraron productos</p>
        </div>
    </main>

        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-body">
                <div class="modal-image-section">
                    <img id="modalImage" src="" alt="Producto" class="modal-image">
                </div>
                <div class="modal-info-section">
                    <span id="modalCategory" class="modal-badge">General</span>
                    <h3 id="modalName" class="modal-title">Nombre del Producto</h3>
                    <p id="modalPrice" class="modal-price">$0.00</p>
                    <div class="modal-divider"></div>
                    <p id="modalDescription" class="modal-description">Descripción del producto</p>
